name: Check and Update

on:
  # Runs at 5:55 every day.
  schedule:
    - cron: '55 23 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  changes:
    name: Check for Changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.current_release.outputs.release }}
      latest: ${{ steps.sqlite_version.outputs.version }}
      x86_url: ${{ steps.sqlite_version.outputs.url_x86 }}
      x64_url: ${{ steps.sqlite_version.outputs.url_x64 }}
    steps:
      - name: 🔍 Get Current Release
        id: current_release
        continue-on-error: true
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: Mediaportal-Plugin-Team/SQLite
          excludes: prerelease, draft
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌐 Get SQLite Version
        id: sqlite_version
        run: |
          CONTENT=$(curl -s https://sqlite.org/download.html)
          DATA_BLOCK=$(echo "$CONTENT" | sed -n '/Download product data for scripts to read/,/-->/p')

          LINE_X64=$(echo "$DATA_BLOCK" | grep "sqlite-dll-win-x64-" | head -n 1)
          LINE_X86=$(echo "$DATA_BLOCK" | grep "sqlite-dll-win-x86-" | head -n 1)

          VERSION=$(echo "$LINE_X64" | cut -d',' -f2)
          REL_URL_X64=$(echo "$LINE_X64" | cut -d',' -f3)
          REL_URL_X86=$(echo "$LINE_X86" | cut -d',' -f3)

          if [ -z "$VERSION" ]; then
            echo "Error: Could not parse SQLite version from the page"
            exit 1
          fi

          URL_X64="https://sqlite.org/${REL_URL_X64}"
          URL_X86="https://sqlite.org/${REL_URL_X86}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "url_x64=$URL_X64" >> $GITHUB_OUTPUT
          echo "url_x86=$URL_X86" >> $GITHUB_OUTPUT

      - name: 🏁 Completed
        run: exit 0

  build:
    name: Build
    if: ${{ needs.changes.outputs.version != needs.changes.outputs.latest }}
    runs-on: ubuntu-latest
    needs:
      - changes
    permissions:
      contents: write
    steps:
      - name: 📥 Git Checkout
        uses: actions/checkout@v7

      - name: 🚚 Download SQLite Files
        shell: bash
        run: |
          mkdir -p download

          curl -Lf -o download/sqlite_x64.zip "${{ needs.changes.outputs.x64_url }}"
          curl -Lf -o download/sqlite_x86.zip "${{ needs.changes.outputs.x86_url }}"

      - name: 📦 Extract and Rename
        shell: bash
        run: |
          unzip download/sqlite_x64.zip -d download/x64_temp
          unzip download/sqlite_x86.zip -d download/x86_temp

          mkdir -p SQLite/sqlite/x64
          mkdir -p SQLite/sqlite/x86

          mv download/x64_temp/sqlite3.dll SQLite/sqlite/x64/sqlite.dll
          mv download/x86_temp/sqlite3.dll SQLite/sqlite/x86/sqlite.dll

          rm -rf download

      - name: 📝 Update Nuspec File
        shell: bash
        run: |
          NEW_VER="${{ needs.changes.outputs.latest }}"
          NEW_YEAR=$(date +'%Y')
          FILE_PATH="SQLite/Sqlite.nuspec"

          sed -i "s|<version>.*</version>|<version>${NEW_VER}</version>|g" "$FILE_PATH"
          sed -i "s|Update to SQLite .* (x86/x64)|Update to SQLite ${NEW_VER} (x86/x64)|g" "$FILE_PATH"
          sed -i "s|<copyright>Copyright (c) 2021-.*</copyright>|<copyright>Copyright (c) 2021-${NEW_YEAR}</copyright>|g" "$FILE_PATH"

          cat "$FILE_PATH"

      - name: 🚀 Commit and Push changes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update SQLite to v${{ needs.changes.outputs.latest }}"
          file_pattern: 'SQLite/sqlite/x64/sqlite.dll SQLite/sqlite/x86/sqlite.dll SQLite/Sqlite.nuspec'

      - name: ⚡ Trigger Release Workflow
        if: steps.auto_commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref master

  report:
    name: Reporting
    if: always()
    needs:
      - changes
      - build
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Generate Summary
        run: |
          if [[ "${{ needs.build.result }}" == "skipped" ]]; then
            STATUS="☕ No updates found"
          elif [[ "${{ needs.build.result }}" == "success" ]]; then
            STATUS="✅ Successfully updated"
          else
            STATUS="❌ Build failed"
          fi

          echo "## 🚀 SQLite Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Latest on site** | \`${{ needs.changes.outputs.latest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Current in repo** | \`${{ needs.changes.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [SQLite Download Page](https://sqlite.org/download.html)" >> $GITHUB_STEP_SUMMARY
